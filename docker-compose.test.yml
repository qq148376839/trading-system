# 测试环境 Docker Compose（独立文件，非 override）
# 用法: docker compose -p trading-test -f docker-compose.test.yml --env-file .env.test up -d --build
#
# 与生产环境完全隔离：独立容器名、端口、数据库 volume、网络
# FutuOpenD 不配置（避免与生产争抢 quota，Futu 请求会超时降级到 LongPort/Moomoo）

services:
  # PostgreSQL 数据库（测试）
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_password}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./api/migrations/000_init_schema.sql:/docker-entrypoint-initdb.d/000_init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d ${POSTGRES_DB:-trading_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network-test

  # 统一应用服务（测试）
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENV_MODE: test
    container_name: trading-app-test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD:-trading_password}@postgres:5432/${POSTGRES_DB:-trading_db}
      TZ: UTC
      PORT: 3001
      NODE_ENV: production
      FRONTEND_PORT: 3000
      LONGPORT_APP_KEY: ${LONGPORT_APP_KEY:-your_app_key}
      LONGPORT_APP_SECRET: ${LONGPORT_APP_SECRET:-your_app_secret}
      LONGPORT_ACCESS_TOKEN: ${LONGPORT_ACCESS_TOKEN:-your_access_token}
      LONGPORT_ENABLE_OVERNIGHT: ${LONGPORT_ENABLE_OVERNIGHT:-false}
      SKIP_LONGPORT_INIT: "true"
      # 不配置 FUTU_BRIDGE_URL — 测试环境禁用 FutuOpenD（默认值指向不存在的容器名，自动超时降级）
    ports:
      - "3003:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/.env.test:/app/api/.env:ro
      - ./logs-test:/app/logs
    networks:
      - trading-network-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data_test:

networks:
  trading-network-test:
    driver: bridge
