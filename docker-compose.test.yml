# 测试环境 Docker Compose Override
# 用法: docker compose -p trading-test -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test up -d --build
#
# 与生产环境完全隔离：独立容器名、端口、数据库 volume、网络
# futu-bridge 共用生产环境实例（无状态服务）

services:
  postgres:
    container_name: trading-postgres-test
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./api/migrations/000_init_schema.sql:/docker-entrypoint-initdb.d/000_init_schema.sql:ro
    networks:
      - trading-network-test

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENV_MODE: test
    container_name: trading-app-test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD:-trading_password}@postgres:5432/${POSTGRES_DB:-trading_db}
      TZ: UTC
      PORT: 3001
      NODE_ENV: production
      FRONTEND_PORT: 3000
      LONGPORT_APP_KEY: ${LONGPORT_APP_KEY:-your_app_key}
      LONGPORT_APP_SECRET: ${LONGPORT_APP_SECRET:-your_app_secret}
      LONGPORT_ACCESS_TOKEN: ${LONGPORT_ACCESS_TOKEN:-your_access_token}
      LONGPORT_ENABLE_OVERNIGHT: ${LONGPORT_ENABLE_OVERNIGHT:-false}
      SKIP_LONGPORT_INIT: "true"
      FUTU_BRIDGE_URL: "http://futu-bridge:8765"
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/.env.test:/app/api/.env:ro
      - ./logs-test:/app/logs
    networks:
      - trading-network-test

  # 禁用 futu-bridge（共用生产环境实例）
  futu-bridge:
    profiles:
      - disabled

volumes:
  postgres_data_test:

networks:
  trading-network-test:
    driver: bridge
