name: RAG Index

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'api/src/services/**'
      - 'api/src/routes/**'
      - 'api/src/utils/**'
      - 'api/src/config/**'
      - 'api/src/middleware/**'
      - 'api/migrations/**'
      - 'CLAUDE.md'
      - 'PROJECT_STATUS.md'
      - 'CHANGELOG.md'
      - 'CODE_MAP.md'
      - '.claude/agents/**'
      - '.claude/teams/**'
  workflow_dispatch: # 手动触发

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: edge-functions/rag-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: edge-functions/rag-server
        run: pnpm install --frozen-lockfile

      - name: Restore index manifest
        uses: actions/cache@v4
        with:
          path: edge-functions/rag-server/.index-manifest.json
          key: rag-manifest-${{ github.sha }}
          restore-keys: rag-manifest-

      - name: Run incremental index
        working-directory: edge-functions/rag-server
        env:
          RAG_API_TOKEN: ${{ secrets.RAG_API_TOKEN }}
          RAG_URL: https://rag.riowang.win
        run: pnpm index
